{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continue verification — OJT Hours</title>
    {% include "partials/bootstrap_head.html" %}
  </head>
  <body class="ojt-page ojt-auth-page bg-body-tertiary" style="--ojt-auth-bg-url: url('{% static 'images/background.jpg' %}');">
    <div class="container-fluid px-3 px-sm-4 py-0">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-lg-6 col-xl-5">
          <div class="card ojt-auth-card border-0 overflow-hidden">
            <div class="card-header border-0 rounded-top-4 ojt-auth-header">
              <strong class="d-flex align-items-center gap-2 ojt-auth-title">
                <i class="bi bi-shield-check ojt-auth-icon" aria-hidden="true"></i>
                Continue verification
              </strong>
              <div class="ojt-auth-subtitle">Enter your email and password to resend OTP</div>
            </div>

            <div class="card-body p-4">
              <form method="post" class="ojt-auth-form" autocomplete="off">
                {% csrf_token %}

                {% if error %}
                  <div class="mb-3">
                    <div class="ojt-auth-warning alert-light border" role="alert">
                      <span class="ojt-auth-warning-text">{{ error }}</span>
                    </div>
                  </div>
                {% endif %}

                <div class="ojt-auth-field">
                  <label for="id_email">Email:</label>
                  <input id="id_email" name="email" type="email" required autocomplete="off" />
                </div>

                <div class="ojt-auth-field">
                  <label for="id_pw">Password:</label>
                  <input id="id_pw" name="password" type="password" required autocomplete="off" />
                  <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="toggleStartPw" />
                    <label class="form-check-label ojt-auth-toggle-label" for="toggleStartPw">
                      Show password
                    </label>
                  </div>
                </div>

                <button class="btn btn-primary ojt-auth-submit ojt-btn-touch" type="submit">
                  Resend OTP
                </button>

                <div class="text-center ojt-auth-footer">
                  <a href="{% url 'clear_otp' %}" class="ojt-auth-link text-decoration-none">Back to login</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const pw = document.getElementById("id_pw");
        const t = document.getElementById("toggleStartPw");
        if (!pw || !t) return;
        t.addEventListener("change", function () {
          pw.type = t.checked ? "text" : "password";
        });
      })();
    </script>
  </body>
</html>
