{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile — OJT Hours</title>
    {% include "partials/bootstrap_head.html" %}
  </head>
  <body class="bg-body-tertiary ojt-page">
    {% include "partials/navbar_ojt.html" with show_clock=True %}

    <div class="container-fluid px-3 px-sm-4 py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-8">
          <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white py-3 border-0 rounded-top-4">
              <strong class="d-flex align-items-center gap-2">
                <i class="bi bi-person-badge text-primary"></i> Profile
              </strong>
              <div class="text-secondary small mt-2">Manage your account</div>
            </div>

            <div class="card-body p-4">
              <div class="mb-3">
                <div class="text-secondary small">Email</div>
                <div class="fw-semibold" id="profileEmail">{{ email }}</div>
              </div>

              {% if error %}
                <div class="mb-3">
                  <div class="ojt-auth-warning alert-light border" role="alert">
                    <span class="ojt-auth-warning-text">{{ error }}</span>
                  </div>
                </div>
              {% endif %}

              <div class="d-grid gap-2">
                <a href="{% url 'change_password_start' %}" class="btn btn-primary ojt-btn-touch w-100">
                  <i class="bi bi-key-fill me-1"></i>Change password
                </a>

                <form method="post" action="{% url 'logout' %}">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-outline-danger ojt-btn-touch w-100">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                  </button>
                </form>

                <form method="post" action="{% url 'profile_delete' %}" onsubmit="return confirm('Delete this account permanently?');" class="mt-5">
                  {% csrf_token %}
                  <input
                    type="password"
                    name="password"
                    class="form-control mb-2"
                    placeholder="Enter your password"
                    autocomplete="off"
                    required
                  />
                  <button type="submit" name="confirm" value="YES" class="btn btn-outline-secondary ojt-btn-touch w-100">
                    <i class="bi bi-trash me-1"></i>Delete account
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
